name: Build

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - uses: conda-incubator/setup-miniconda@v2

      - name: Build Conda Package
        shell: cmd /C CALL {0}
        run: |
          conda install conda-build && ^
          conda-build .
