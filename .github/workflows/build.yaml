name: Build

on:
  push:
    branches:
      - master


defaults:
  run:
    shell: bash


jobs:
  build:
    name: Build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          python-version: 3.8

      - name: Build Conda Package
        shell: cmd
        run: conda install conda-build && conda-build .
